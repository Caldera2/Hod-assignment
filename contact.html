<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Contact Me</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="skills.html">Skills</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <h2>Contact Form</h2>
    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="message">Message</label>
      <textarea id="message" name="message"></textarea>

      <button type="submit">Submit</button>
    </form>

    <h2>Comments</h2>
    <div class="comment-box">
      <p class="small-text">People can leave a comment here and it will show below on this browser.</p>
      <form id="commentForm">
        <label for="commentName">Your Name</label>
        <input type="text" id="commentName" name="commentName" required>

        <label for="commentText">Your Comment</label>
        <textarea id="commentText" name="commentText" required></textarea>

        <button type="submit">Post Comment</button>
      </form>
    </div>

    <div class="comment-list">
      <h3>Saved Comments</h3>
      <div id="commentsContainer">
        <p class="small-text">No comments yet.</p>
      </div>
    </div>

    <div class="footer">
      Contact page.
    </div>
  </div>
  <script src="comments.js"></script>
</body>
</html>
